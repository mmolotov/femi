name: femi

services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      server:
        condition: service_started
    env_file:
      - ../.env
    environment:
      WEB_APP_URL: ${WEB_APP_URL}

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_BOT_SECRET_TOKEN: ${TELEGRAM_BOT_SECRET_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      TELEGRAM_INIT_DATA_EXPIRES_IN: ${TELEGRAM_INIT_DATA_EXPIRES_IN:-3600}
      HOST: 0.0.0.0
      PORT: 3001
      WEB_APP_URL: ${WEB_APP_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  worker:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    command: ["pnpm", "--filter", "@femi/server", "start:worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_BOT_SECRET_TOKEN: ${TELEGRAM_BOT_SECRET_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      HOST: 0.0.0.0
      PORT: 3001
      WEB_APP_URL: ${WEB_APP_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # The worker is the monitoring collector: it runs metric SQL on the
      # read-only pool. Set MONITORING_DATABASE_URL to the read-only role DSN.
      MONITORING_DATABASE_URL: ${MONITORING_DATABASE_URL:-}
      MONITORING_ENABLED: ${MONITORING_ENABLED:-true}

  monitoring:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    command: ["pnpm", "--filter", "@femi/server", "start:monitoring"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}
      # Optional read-only role DSN; falls back to DATABASE_URL when unset.
      MONITORING_DATABASE_URL: ${MONITORING_DATABASE_URL:-}
      MONITORING_HOST: 0.0.0.0
      MONITORING_PORT: ${MONITORING_PORT:-3002}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Internal-only: bound to host loopback (reach it via SSH tunnel), and it never
    # joins the public `edge` network in docker-compose.prod.yml.
    ports:
      - 127.0.0.1:${MONITORING_PORT:-3002}:${MONITORING_PORT:-3002}

  migrate:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    command: ["node", "packages/db/dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}

  postgres:
    image: postgres:18-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-femi}
      POSTGRES_USER: ${POSTGRES_USER:-femi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-femi}
    ports:
      - 127.0.0.1:${POSTGRES_PORT:-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-femi} -d ${POSTGRES_DB:-femi}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backup:
    build:
      context: ..
      dockerfile: infrastructure/backup/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}
      S3_BACKUP_ENDPOINT: ${S3_BACKUP_ENDPOINT}
      S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET}
      S3_BACKUP_REGION: ${S3_BACKUP_REGION}
      S3_BACKUP_ACCESS_KEY: ${S3_BACKUP_ACCESS_KEY}
      S3_BACKUP_SECRET_KEY: ${S3_BACKUP_SECRET_KEY}
      BACKUP_CRON_SCHEDULE: "${BACKUP_CRON_SCHEDULE:-0 3 * * *}"

volumes:
  postgres_data:
