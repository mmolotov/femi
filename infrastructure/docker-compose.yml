services:
  caddy:
    image: caddy:2
    depends_on:
      - web
      - server
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-ops@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      server:
        condition: service_started

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_BOT_SECRET_TOKEN: ${TELEGRAM_BOT_SECRET_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      TELEGRAM_INIT_DATA_EXPIRES_IN: ${TELEGRAM_INIT_DATA_EXPIRES_IN:-3600}
      HOST: 0.0.0.0
      PORT: 3001
      WEB_APP_URL: ${WEB_APP_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  worker:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    command: ["pnpm", "--filter", "@femi/server", "start:worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_BOT_SECRET_TOKEN: ${TELEGRAM_BOT_SECRET_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      HOST: 0.0.0.0
      PORT: 3001
      WEB_APP_URL: ${WEB_APP_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  migrate:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    command: ["node", "packages/db/dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}

  postgres:
    image: postgres:18-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-femi}
      POSTGRES_USER: ${POSTGRES_USER:-femi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-femi}
    ports:
      - 127.0.0.1:${POSTGRES_PORT:-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-femi} -d ${POSTGRES_DB:-femi}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backup:
    build:
      context: ..
      dockerfile: infrastructure/backup/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-femi}:${POSTGRES_PASSWORD:-femi}@postgres:5432/${POSTGRES_DB:-femi}
      S3_BACKUP_ENDPOINT: ${S3_BACKUP_ENDPOINT}
      S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET}
      S3_BACKUP_REGION: ${S3_BACKUP_REGION}
      S3_BACKUP_ACCESS_KEY: ${S3_BACKUP_ACCESS_KEY}
      S3_BACKUP_SECRET_KEY: ${S3_BACKUP_SECRET_KEY}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
