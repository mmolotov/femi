services:
  web:
    networks:
      - default
      - edge
    labels:
      - caddy=${APP_DOMAIN:-localhost}
      - caddy.encode=zstd gzip
      - caddy.@api.path=/api /api/*
      - caddy.0_reverse_proxy=@api server:3001
      - caddy.@telegram.path=/telegram /telegram/*
      - caddy.1_reverse_proxy=@telegram server:3001
      - caddy.2_reverse_proxy={{upstreams 4173}}
      - caddy_ingress_network=${EDGE_NETWORK_NAME:-edge}

  server:
    environment:
      NODE_ENV: production
      # Behind Caddy/Cloudflare: trust the proxy so request.ip and the
      # CF-Connecting-IP rate-limit key reflect the real client.
      TRUST_PROXY: "true"
    networks:
      - default
      - edge

  worker:
    environment:
      NODE_ENV: production

  monitoring:
    environment:
      NODE_ENV: production
    # Join the shared monitoring network so the infra cloudflared can reach
    # this dashboard by container name. The dashboard is still not on edge,
    # so the only public path is via Cloudflare Tunnel + Access.
    networks:
      - default
      - monitoring

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK_NAME:-edge}
  monitoring:
    external: true
    name: ${MONITORING_NETWORK_NAME:-monitoring}

volumes:
  postgres_data:
    external: true
    name: ${POSTGRES_VOLUME_NAME:-femi-postgres-data}
