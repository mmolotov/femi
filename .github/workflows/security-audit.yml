name: Security Audit

# Cooldown (pnpm minimumReleaseAge + Dependabot cooldown) only delays *new*
# versions. This scheduled job catches advisories disclosed against versions
# already in the lockfile and fails when any moderate+ advisory is present.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate package manager
        run: corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate
